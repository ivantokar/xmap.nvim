name: sast

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: actions
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
